project_name: deadcert
version: "{{.Version}}"
before:
  hooks:
    - go mod tidy
builds:
  - id: deadcert
    main: .
    binary: deadcert
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
snapshot:
  version_template: "{{.Tag}}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^refactor:"
      - Merge pull request
      - Merge branch
release:
  github:
    owner: Zuhayr-Barhoumi
    name: deadcert
  draft: false
  prerelease: auto