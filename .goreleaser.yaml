project_name: deadcert
before:
  hooks:
    - go mod tidy
builds:
  - id: deadcert
    main: .
    binary: deadcert
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: checksums.txt
release:
  extra_files:
    - glob: install.sh
  github:
    owner: zuhayrb
    name: deadcert
  draft: false
  prerelease: auto
snapshot:
  version_template: "{{.Tag}}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^refactor:"
      - Merge pull request
      - Merge branch